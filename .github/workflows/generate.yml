name: Generate FastMCP Docset

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [fastmcp-release]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Generate missing docsets
        id: generate
        run: |
          bun run generate:missing -- \
            --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
            --result-file .cache/generation-result.json
          echo "has_new=$(bun -e 'const result = await Bun.file(".cache/generation-result.json").json(); console.log(result.hasNew ? "true" : "false")')" >> "$GITHUB_OUTPUT"

      - name: Commit generated docsets
        if: steps.generate.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          git commit -m "Update generated FastMCP docsets"
          git push
